<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión | Plan Eat</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-background"></div>

      <section class="auth-card">
        <div class="auth-card-left">
          <span class="auth-eyebrow">Plan Eat</span>
          <h1>Bienvenido de nuevo</h1>
          <p>
            Inicia sesión para guardar tus recetas favoritas, organizar tu menú
            semanal y tener tu lista de la compra siempre a mano.
          </p>

          <a href="index.html" class="auth-back-link">← Volver al inicio</a>
        </div>

        <div class="auth-card-right">
          <h2>Iniciar sesión</h2>

          <form class="auth-form">
            <div class="form-group">
              <label for="email">Correo electrónico</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Introduce tu correo"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Contraseña</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Introduce tu contraseña"
                required
              />
            </div>

            <button type="submit" class="auth-btn auth-btn-primary">
              Entrar
            </button>
          </form>

          <p class="auth-alt-text">
            ¿Todavía no tienes cuenta?
            <a href="register.html">Regístrate</a>
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
