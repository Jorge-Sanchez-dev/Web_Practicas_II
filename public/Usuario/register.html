<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro | Plan Eat</title>
    <link rel="stylesheet" href="register.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-background"></div>

      <section class="auth-card">
        <div class="auth-card-left">
          <span class="auth-eyebrow">Plan Eat</span>
          <h1>Crea tu cuenta</h1>
          <p>
            Regístrate para descubrir recetas, organizar tus comidas y generar
            tu lista de la compra de forma rápida y sencilla.
          </p>

          <a href="index.html" class="auth-back-link">← Volver al inicio</a>
        </div>

        <div class="auth-card-right">
          <h2>Registrarte</h2>

          <form class="auth-form">
            <div class="form-group">
              <label for="name">Nombre</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Introduce tu nombre"
                required
              />
            </div>

            <div class="form-group">
              <label for="email">Correo electrónico</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Introduce tu correo"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Contraseña</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Crea una contraseña"
                required
              />
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirmar contraseña</label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Repite la contraseña"
                required
              />
            </div>

            <button type="submit" class="auth-btn auth-btn-primary">
              Crear cuenta
            </button>
          </form>

          <p class="auth-alt-text">
            ¿Ya tienes cuenta?
            <a href="login.html">Inicia sesión</a>
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
